name: Event Discovery Scan

on:
  schedule:
    # Mon and Thu at 5am AZ (MST = UTC-7, no DST)
    - cron: '0 12 * * 1'   # Monday 5am AZ
    - cron: '0 12 * * 4'   # Thursday 5am AZ
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit updated events-cache.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
        working-directory: daily-report

      - name: Run event scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: node scan-events.js
        working-directory: daily-report

      - name: Commit updated events cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-report/events-cache.json
          git diff --staged --quiet || git commit -m "chore: update events cache [skip ci]"
          git push
